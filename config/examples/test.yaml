# Minimal example configuration using the current schema
#
# This file is intended as a compact example. For a fully annotated template,
# see `config/examples/config.yaml`.

experiment: 'example_test_run'

data_dir: '/path/to/test-fastqs'
ref_dir: 'references'
samples_file: 'config/examples/samples.csv'

fusion_library:
  anchor:
    name: 'Met_WT'
    position: 'downstream'
    truncated_component: 'anchor'
  linker_sequence: 'GGGAGC'
  partners_file: 'config/examples/fusion_partners.csv'
  sequences_file: 'kinase_sequences_hov.fasta'
  unfused_sequences_file: 'config/examples/kinase_unfused.csv'

detection:
  method: 'string'
  breakpoint_window: 13
  maintain_frame: true
  kmer_size: 15
  orientation_check: false
  prefilter_fallback: false
  unmerged_detection: false

sequencing:
  paired: true
  min_quality: 30

preprocessing:
  adapters: 'resources/adapters.fa'
  contaminants:
    - 'resources/sequencing_artifacts.fa.gz'
    - 'resources/phix174_ill.ref.fa.gz'

qc:
  run_qc: false
  baseline_condition: 'baseline'
  mem_fastqc: 4000

pipeline:
  show_progress: false
  progress_interval: 10

resources:
  memory_mb: 16000
  threads: 8

quick:
  enabled: false
  max_reads: 100000
  fraction: null
  seed: 1337
