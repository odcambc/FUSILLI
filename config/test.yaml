# Minimal repository-local test configuration
#
# This file uses the current FUSILLI config schema and points at the small
# fixtures under `tests/` so the pipeline can be smoke-tested locally.

experiment: 'test_experiment'

data_dir: 'tests/data'
ref_dir: 'tests/references'
samples_file: 'tests/config/test_samples.csv'

fusion_library:
  anchor:
    name: 'Met_WT'
    position: 'downstream'
    truncated_component: 'anchor'
  linker_sequence: 'GGGAGC'
  partners_file: 'tests/config/test_partners.csv'
  sequences_file: 'test_sequences.fasta'

detection:
  method: 'string'
  breakpoint_window: 12
  maintain_frame: true
  kmer_size: 15
  orientation_check: false
  prefilter_fallback: false
  unmerged_detection: false

sequencing:
  paired: true
  min_quality: 30

preprocessing:
  adapters: 'resources/adapters.fa'
  contaminants: []

qc:
  run_qc: false
  baseline_condition: 'baseline'
  mem_fastqc: 1000

pipeline:
  show_progress: false
  progress_interval: 10

resources:
  memory_mb: 4000
  threads: 4
